services:
  db:
    image: postgres:15
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/code/app
      - ./media:/code/media
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    
  
  worker:
    build: .
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - ./app:/code/app
      - ./media:/code/media
    env_file: .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
