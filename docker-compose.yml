services:

  db:
    image: postgres:16-alpine
    container_name: clone_db
    restart: always
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    container_name: clone_redis
    ports:
      - "6379:6379"


  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video_clone_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 
    ports:
      - "8000:8000"
    volumes:
      - .:/app # Maps the root project to the WORKDIR
      - shared_media:/app/media
    env_file: .env
    depends_on:
      - db
      - redis
  
  worker:
    build: .
    container_name: video_clone_worker
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=1
    volumes:
      - .:/app
      - shared_media:/app/media
    env_file: .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  shared_media:
    

  
  
    